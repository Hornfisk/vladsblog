
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>vlads.blog</title>
    <meta name="description" content="A personal tech blog focusing on cybersecurity and AI" />
    <meta name="author" content="Vlad" />
    <meta name="theme-color" content="#151821" />
    <meta property="og:title" content="vlads.blog" />
    <meta property="og:description" content="A personal tech blog focusing on cybersecurity and AI" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://owwhvpjerkjdbmfexfii.supabase.co/functions/v1/og-image" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- PWA support -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="196x196" href="/icons/favicon-196.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-startup-image" href="/icons/apple-splash-2048-2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Google Fonts as backup (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
          rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    </noscript>
    
    <!-- Preload self-hosted fonts -->
    <link 
      rel="preload" 
      href="/fonts/JetBrainsMono-Regular.woff2" 
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link 
      rel="preload" 
      href="/fonts/JetBrainsMono-Medium.woff2" 
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link 
      rel="preload" 
      href="/fonts/JetBrainsMono-Bold.woff2" 
      as="font"
      type="font/woff2"
      crossorigin
    />
    
    <!-- Preconnect to Supabase to reduce API latency -->
    <link rel="preconnect" href="https://owwhvpjerkjdbmfexfii.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://owwhvpjerkjdbmfexfii.supabase.co">

    <!-- Inline critical CSS: eliminates render-blocking CSS for above-the-fold paint -->
    <style>
      *,::before,::after{box-sizing:border-box}
      html{overflow-y:scroll}
      body{margin:0;background-color:#151821;background-image:radial-gradient(rgba(155,135,245,.04) 1px,transparent 1px);background-size:28px 28px;font-family:'JetBrains Mono',ui-monospace,monospace;color:#f3f4f6;min-height:100vh}
      #root{min-height:100vh}
    </style>

    <!-- Lovable script for new features -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module" defer></script>
    
    <script>
      (function() {
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href && redirect.startsWith(location.origin + '/')) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" defer></script>
  </body>
</html>
